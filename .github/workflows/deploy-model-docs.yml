# Deploys the self-model's committed doc site (model/site, built by
# `pds doc model`) to Cloudflare Pages. The site is generated and committed —
# no build step here, so the deploy is exactly what was reviewed.
#
# One-time setup:
#   - Create the Pages project:  wrangler pages project create pseudoscript-model-docs --production-branch=main
#   - Repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit) and CLOUDFLARE_ACCOUNT_ID.
name: deploy-model-docs

on:
  push:
    branches: [main]
    paths:
      - "model/site/**"
      - ".github/workflows/deploy-model-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-model-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy model/site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy model/site --project-name=pseudoscript-model-docs
