name: release-assets

# Builds the cross-platform `pds` binaries and attaches them — plus SHA256SUMS
# and the install scripts — to a GitHub Release, then marks it the latest.
#
# Called from release.yml in the same run right after release-plz publishes the
# release (a separate `on: release: published` trigger would NOT fire, because
# release-plz creates the release with GITHUB_TOKEN and GitHub suppresses
# downstream workflow runs for token-raised events). Also exposed via
# workflow_dispatch to rebuild/attach assets to any existing tag by hand.
#
# The install scripts (scripts/install.sh, scripts/install.ps1) resolve the
# latest release's tag and download `pds-<target>.{tar.gz,zip}` + SHA256SUMS
# from it, so attaching these assets and marking the release `--latest` is what
# makes `curl … | bash` / `irm … | iex` work.
on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build + attach assets to (e.g. v0.1.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build + attach assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-assets-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  # Build native binaries for the released commit. Runner arch is load-bearing:
  # macos-latest is Apple Silicon (aarch64). Intel macOS (x86_64-apple-darwin) is
  # not shipped — keep it out of the installer and `pds upgrade` too.
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest   # Apple Silicon
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked -p pseudoscript --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf "dist/pds-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" pds
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/pds.exe" -DestinationPath "dist/pds-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: pds-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # Checksum the binaries and attach them, SHA256SUMS, and the install scripts to
  # the release. Does NOT mark the release latest — that is gated behind `smoke`
  # and performed by `mark-latest`, so a release only goes live after the
  # freshly-uploaded artifacts install and run on all three OSes.
  publish:
    name: Upload assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum pds-* > SHA256SUMS
          cat SHA256SUMS
      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release upload "$TAG" \
            dist/pds-*.tar.gz dist/pds-*.zip dist/SHA256SUMS \
            scripts/install.sh scripts/install.ps1 \
            --clobber

  # Gate: on each OS, install the just-uploaded binary via the just-uploaded
  # install script (pinned to the tag — no `latest` resolution, since the release
  # is deliberately not latest yet), assert it runs, then exercise `pds upgrade`
  # self-replace. All three legs must pass before the release goes live. No token:
  # release-download URLs and `pds upgrade` use public URLs only; the `latest` API
  # is never hit.
  smoke:
    name: Smoke ${{ matrix.os }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    steps:
      # Unix (Linux + macOS): run the uploaded install.sh pinned to the tag, then
      # exercise the binary and `pds upgrade`.
      - name: Smoke (unix)
        if: matrix.shell == 'bash'
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Install via the uploaded install.sh asset, pinned to the tag.
          # PDS_VERSION=<tag> skips the /releases/latest API entirely.
          curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/install.sh" \
            | PDS_VERSION="${TAG}" bash

          # install.sh installs to $HOME/.pseudoscript/bin by default.
          export PATH="$HOME/.pseudoscript/bin:$PATH"

          # Version must match the tag (strip leading 'v': v0.1.0 -> pds 0.1.0).
          ver_out="$(pds --version)"
          echo "version: $ver_out"
          expected="${TAG#v}"
          if ! printf '%s' "$ver_out" | grep -qE "(^| )${expected}( |$)"; then
            echo "error: 'pds --version' = '$ver_out', expected to contain '$expected'" >&2
            exit 1
          fi

          # Valid single-module model: must eval clean (exit 0).
          printf '//! smoke\n\npublic system S;\n' | pds eval

          # Genuinely invalid single-module model: must exit non-zero.
          if printf 'system S { container C }\n' | pds eval; then
            echo "error: invalid model evaluated successfully (expected failure)" >&2
            exit 1
          fi

          # Exercise self-replace on this OS: re-install the same tag.
          pds upgrade "${TAG}"

          # Binary still works after self-replace.
          pds --version

      # Windows: run the uploaded install.ps1 pinned to the tag, then exercise the
      # binary and `pds upgrade`.
      - name: Smoke (windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        env:
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $ProgressPreference = "SilentlyContinue"

          $tag  = $env:TAG
          $repo = $env:REPO

          # Download the uploaded install.ps1 to a file and run it (file-based, so a
          # script parse error surfaces clearly and the shipped env-var path is used).
          $ps1 = Join-Path $env:RUNNER_TEMP "install.ps1"
          Invoke-WebRequest -Uri "https://github.com/$repo/releases/download/$tag/install.ps1" `
            -OutFile $ps1 -UseBasicParsing

          # Run the installer. install.ps1 is a PowerShell script (not an external
          # exe), so $LASTEXITCODE is unreliable after `& $ps1` (null on success);
          # rely on $ErrorActionPreference=Stop for throws and assert the binary
          # landed instead.
          $env:PDS_VERSION = $tag
          & $ps1

          # install.ps1 installs to $env:USERPROFILE\.pseudoscript\bin by default.
          $binDir = Join-Path $env:USERPROFILE ".pseudoscript\bin"
          $exe = Join-Path $binDir "pds.exe"
          if (-not (Test-Path $exe)) { Write-Error "install.ps1 did not produce $exe"; exit 1 }
          $env:PATH = "$binDir;$env:PATH"

          # Version must match the tag (strip leading 'v').
          $verOut   = (pds --version)
          Write-Host "version: $verOut"
          $expected = $tag.TrimStart('v')
          if ($verOut -notmatch "(^|\s)$([regex]::Escape($expected))(\s|`$)") {
            Write-Error "'pds --version' = '$verOut', expected to contain '$expected'"
            exit 1
          }

          # Valid single-module model: must eval clean (exit 0).
          "//! smoke`n`npublic system S;" | pds eval
          if ($LASTEXITCODE -ne 0) { Write-Error "valid model failed to eval"; exit 1 }

          # Genuinely invalid single-module model: must exit non-zero.
          "system S { container C }" | pds eval
          if ($LASTEXITCODE -eq 0) { Write-Error "invalid model evaluated successfully"; exit 1 }

          # Exercise self-replace on Windows: re-install the same tag.
          pds upgrade $tag
          if ($LASTEXITCODE -ne 0) { Write-Error "pds upgrade failed"; exit 1 }

          # Binary still works after self-replace.
          pds --version
          if ($LASTEXITCODE -ne 0) { Write-Error "pds --version failed post-upgrade"; exit 1 }

  # Go-live: mark the release latest, only reachable if all three smoke legs
  # passed. A failed smoke skips this, so the release stays not-latest and the
  # pipeline is red. Idempotent on workflow_dispatch re-runs.
  mark-latest:
    name: Mark release latest
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # No checkout in this job, so tell gh which repo to act on (it otherwise
      # infers it from the git remote and fails with "not a git repository").
      GH_REPO: ${{ github.repository }}
      TAG: ${{ inputs.tag }}
    steps:
      - name: Mark latest (go live)
        run: gh release edit "$TAG" --latest
