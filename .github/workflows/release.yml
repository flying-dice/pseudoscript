name: release

on:
  push:
    branches: [main]

permissions:
  contents: write       # create releases/tags, upload assets
  pull-requests: write  # open/update the release PR

# Never run release-plz against itself concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Open or update the version-bump + changelog PR from conventional commits.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After a release PR merges, tag the commit (`v<version>`) and create the
  # GitHub Release for the `pseudoscript` CLI crate (see release-plz.toml).
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the cross-platform binaries + checksums and attach them, with the
  # install scripts, to the freshly published release — in this same run, so it
  # does not depend on a release-event trigger (which GITHUB_TOKEN suppresses).
  # The single-crate release config means releases[0] is the `v<version>` tag.
  assets:
    name: Release assets
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release-assets.yml
    with:
      tag: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
    secrets: inherit
