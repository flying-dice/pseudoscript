name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # create releases + tags
  issues: write         # @semantic-release/github success comments
  pull-requests: write  # @semantic-release/github success comments

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Each target builds natively — no cross-compilation. Runner arch is
        # load-bearing: macos-13 is the last Intel (x86_64) image; macos-latest
        # is Apple Silicon (arm64). Do not "modernize" macos-13 to macos-latest.
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13       # Intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest   # Apple Silicon
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked -p pseudoscript --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf "dist/pds-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" pds
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/pds.exe" -DestinationPath "dist/pds-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: pds-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum pds-* > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install semantic-release
        run: npm install -g semantic-release@24
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
