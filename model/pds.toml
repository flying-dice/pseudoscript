# The PseudoScript compiler modelling its own design — one .pds module per crate
# (cli, syntax, model, format, emit, doc, lsp). Lives at `<root>/model` by
# convention; `pds doc model` renders its diagrams and doc site.
#
# The site builds to `site/` (tracked and committed, unlike the default
# `target/doc`) so Cloudflare Pages serves the committed output straight from
# the repo (no build command; output directory `model/site`) — rebuild with
# `pds doc model` and commit alongside any model change.
[doc]
name  = "PseudoScript"
out   = "site"
logo  = "logo.svg"
theme = "system"
