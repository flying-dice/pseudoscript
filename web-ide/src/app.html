<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="PseudoScript Web IDE — architecture as code. Model C4-level systems in plain pseudocode and compile them to interactive diagrams." />
    <meta name="theme-color" content="#0a0b0e" />
    <!-- Installable PWA: manifest + platform icons + standalone app metadata. -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PseudoScript" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PseudoScript Web IDE" />
    <meta property="og:description" content="Architecture as code — model C4-level systems and compile them to interactive diagrams." />
    <meta property="og:image" content="%sveltekit.assets%/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Apply the saved theme before first paint (no flash). Mirrors theme.svelte.js. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("pds-theme");
          var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = p === "light" || p === "dark" ? p : dark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
