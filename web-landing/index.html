<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PseudoScript — Model-driven engineering, pseudocode reignited</title>
  <meta name="description" content="PseudoScript brings model-driven engineering and pseudocode together: write your architecture as plain pseudocode and generate C4 models and sequence diagrams. The model is the source of truth.">

  <link rel="icon" href="/pds-logo.svg">
  <script>
    // Resolve theme before first paint (no FOUC). Explicit choice wins; else follow the OS.
    try {
      var t = localStorage.getItem('pds-theme');
      if (t !== 'dark' && t !== 'light')
        t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
